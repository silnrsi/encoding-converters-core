# Build encoding converters and run tests

name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: "./EncConverters 2019.sln"

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      # Keep building other jobs even if another fails, to show what _is_ still working.
      fail-fast: false
      matrix:
        build_configuration: ["Debug", "Release"]
        build_platform: ["Win32", "x64"]

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    # Install ATL/MFC (for windows-2022, this is v143)
    - name: Install Visual Studio ATL/MFC components
      shell: powershell
      run: |
        Set-Location "C:\Program Files (x86)\Microsoft Visual Studio\Installer\"
        $vsInstallPath = & .\vswhere.exe -latest -products * -property installationPath

        $components = @(
          "--add Microsoft.VisualStudio.Component.VC.ATL",
          "--add Microsoft.VisualStudio.Component.VC.MFC"
        ) -join ' '

        $args = @(
          "modify",
          "--installPath `"$vsInstallPath`"",
          $components,
          "--quiet",
          "--norestart",
          "--nocache"
        )

        Start-Process -FilePath .\vs_installer.exe -ArgumentList $args -Wait -NoNewWindow

    # Locate MSBuild (no Node dependency)
    - name: Locate MSBuild
      id: msbuild
      shell: powershell
      run: |
        $path = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
          -latest -products * -requires Microsoft.Component.MSBuild `
          -find MSBuild\**\Bin\MSBuild.exe

        echo "MSBUILD_PATH=$path" >> $env:GITHUB_ENV

    # Setup NuGet
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # Cache NuGet packages
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore NuGet dependencies
      run: nuget restore "${{env.SOLUTION_FILE_PATH}}"

    - name: Build
      shell: cmd
      run: >
        "%MSBUILD_PATH%"
        /m
        /v:m
        /bl:build-${{matrix.build_platform}}-${{matrix.build_configuration}}.binlog
        /p:Configuration=${{matrix.build_configuration}}
        /p:Platform=${{matrix.build_platform}}
        "${{env.SOLUTION_FILE_PATH}}"

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.build_platform }}-${{ matrix.build_configuration }}
        path: build-*.binlog

    - name: Upload build artifacts
      if: matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.build_platform }}-${{ matrix.build_configuration }}
        path: |
          output\${{ matrix.build_platform }}\${{ matrix.build_configuration }}\*.exe
          output\${{ matrix.build_platform }}\${{ matrix.build_configuration }}\*.dll
          output\${{ matrix.build_platform }}\${{ matrix.build_configuration }}\*.tlb
          output\${{ matrix.build_platform }}\${{ matrix.build_configuration }}\*.config
          output\MergeModules\**\*.*
        retention-days: 1

  publish_nuget:
    needs: build-windows
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Restore artifact layout
      shell: powershell
      run: |
        $folders = Get-ChildItem -Directory -Path . | Where-Object { $_.Name -like 'build-artifacts-*' }

        foreach ($folder in $folders) {
          Copy-Item "$($folder.FullName)\*" -Destination . -Recurse -Force
        }

    - name: List combined files
      shell: cmd
      run: dir /s combined

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Create NuGet package
      run: >
        nuget pack ./Package.Release.nuspec
        -OutputDirectory ./output/Release

    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: release-nuget-package
        path: ./output/Release/*.nupkg